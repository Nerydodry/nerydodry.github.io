<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>App de Música</title>

<style>

body{
    font-family: Arial;
    background:#121212;
    color:white;
    text-align:center;
}

/* CONTAINER PRINCIPAL */
.container{
    width:350px;
    margin:auto;
}

/* PLAYER */
.player{
    margin-bottom:20px;
}

/* PLAYLIST */
.playlist{
    background:#1db954;
    color:black;
    margin:20px 0;
    border-radius:12px;
    cursor:pointer;
    padding:15px;
    transition:0.3s;
}

.playlist:hover{
    transform:scale(1.05);
}

/* TABELA */
table{
    width:100%;
    background:#1e1e1e;
    border-radius:0 0 12px 12px;
    display:none;
}

td{
    padding:10px;
    border-bottom:1px solid #333;
}

/* BOTÃO */
button{
    background:#1db954;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#17a74a;
}

</style>

<script>

function abrirPlaylist(id){
    let tabela = document.getElementById(id);

    if(tabela.style.display === "table"){
        tabela.style.display = "none";
    }else{
        tabela.style.display = "table";
    }
}

function tocar(videoId){
    let player = document.getElementById("player");
    player.src = "https://www.youtube.com/embed/" + videoId;
}

</script>

</head>

<body>

<div class="container">

<h1>🎧 Meu App de Música</h1>

<!-- PLAYER -->
<div class="player">
<iframe id="player" width="100%" height="180" 
style="border-radius:12px;" src="" allowfullscreen>
</iframe>
</div>

<!-- PLAYLIST ROCK -->
<div class="playlist" onclick="abrirPlaylist('rock')">
<h2>🎸 Playlist Rock</h2>
</div>

<table id="rock">
<tr>
<td>Nirvana - Smells Like Teen Spirit</td>
<td><button onclick="tocar('hTWKbfoikeg')">▶ Tocar</button></td>
</tr>

<tr>
<td>Linkin Park - Numb</td>
<td><button onclick="tocar('kXYiU_JCYtU')">▶ Tocar</button></td>
</tr>

<tr>
<td>Arctic Monkeys - Do I Wanna Know</td>
<td><button onclick="tocar('bpOSxM0rNPM')">▶ Tocar</button></td>
</tr>
</table>

<!-- PLAYLIST RAP -->
<div class="playlist" onclick="abrirPlaylist('rap')">
<h2>🔥 Playlist Rap</h2>
</div>

<table id="rap">
<tr>
<td>Eminem - Lose Yourself</td>
<td><button onclick="tocar('_Yhyp-_hX2s')">▶ Tocar</button></td>
</tr>

<tr>
<td>Drake - God's Plan</td>
<td><button onclick="tocar('xpVfcZ0ZcFM')">▶ Tocar</button></td>
</tr>

<tr>
<td>Travis Scott - Goosebumps</td>
<td><button onclick="tocar('Dst9gZkq1a8')">▶ Tocar</button></td>
</tr>
</table>

</div>

</body>
</html>
